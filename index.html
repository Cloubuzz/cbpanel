<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloubuzz Admin</title>
    
    <!-- Tailwind CSS via CDN for rapid styling compatibility -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              // Custom Dark Teal / Neon Palette
              slate: {
                850: '#151e29',
                900: '#0f172a',
                950: '#020617', // Deep space
              },
              teal: {
                50: '#f0fdfa',
                100: '#ccfbf1',
                200: '#99f6e4',
                300: '#5eead4',
                400: '#2dd4bf', // Neon Start
                500: '#14b8a6', // Neon Mid
                600: '#0d9488',
                700: '#0f766e',
                800: '#115e59', // Rich Teal
                900: '#052e2b', // Dark Teal
                950: '#021816', // Deepest Teal
              },
            },
            boxShadow: {
              'neon': '0 0 5px theme("colors.teal.400"), 0 0 20px theme("colors.teal.600")',
              'neon-sm': '0 0 2px theme("colors.teal.400"), 0 0 10px theme("colors.teal.600")',
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          }
        }
      }
    </script>
    
    <!-- ReactFlow Styles -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow/dist/style.css" />
    
    <style>
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #115e59;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #2dd4bf;
      }
      
      /* Glassmorphism utilities */
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(226, 232, 240, 0.6);
      }
      
      .dark .glass {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(45, 212, 191, 0.1);
      }
      
      .glass-card {
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.9) 0%, rgba(241, 245, 249, 0.8) 100%);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(226, 232, 240, 0.8);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }

      .dark .glass-card {
        background: linear-gradient(145deg, rgba(15, 23, 42, 0.9) 0%, rgba(5, 46, 43, 0.4) 100%);
        border: 1px solid rgba(45, 212, 191, 0.15);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      }

      .dark .glass-card:hover {
        border-color: rgba(45, 212, 191, 0.4);
        box-shadow: 0 0 15px rgba(45, 212, 191, 0.15);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "reactflow": "https://esm.sh/reactflow@^11.11.4",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4"
  }
}
</script>
</head>
  <body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased selection:bg-teal-500 selection:text-white transition-colors duration-300">
    <div id="root"></div>
    <!-- Vite Entry Point -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
